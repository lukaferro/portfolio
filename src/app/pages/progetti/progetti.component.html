<section class="page-section">
  <h1 class="page-title" appScrollFade>Progetti</h1>

  <div class="projects-grid">
    @for (project of projects; track project.title) {
      <div class="project-card" appScrollFade>
        <div class="card-image">
          <div class="card-image-placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ff9900" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </div>
        </div>
        <div class="card-body">
          <h2 class="card-title">{{ project.title }}</h2>
          <p class="card-description">{{ project.description }}</p>
          <div class="card-techs">
            @for (tech of project.techs; track tech) {
              <span class="tech-tag">{{ tech }}</span>
            }
          </div>
          @if (project.links.length > 0) {
            <div class="card-links">
              @for (link of project.links; track link.label) {
                <a [href]="link.url" target="_blank" class="card-link">{{ link.label }}</a>
              }
            </div>
          }
        </div>
      </div>
    }
  </div>
</section>
