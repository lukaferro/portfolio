<section class="page-section">
  <h1 class="page-title" appScrollFade>Contatti</h1>

  <div class="info-cards" appScrollFade>
    <div class="info-card">
      <div class="info-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff9900" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      </div>
      <h3>Email</h3>
      <a href="mailto:luca.ferro2003@gmail.com">luca.ferro2003&#64;gmail.com</a>
    </div>
    <div class="info-card">
      <div class="info-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff9900" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </div>
      <h3>Telefono</h3>
      <a href="tel:+393775454100">+39 377 545 4100</a>
    </div>
    <div class="info-card">
      <div class="info-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff9900" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <h3>Ubicazione</h3>
      <p>Varese, Italia</p>
    </div>

  </div>

  <div class="form-section" appScrollFade>
    <h2 class="form-title">Scrivimi</h2>
    <form class="contact-form" (ngSubmit)="inviaForm()" #form="ngForm">
      <div class="form-row">
        <div class="form-group">
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" [(ngModel)]="formData.nome" placeholder="Il tuo nome" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" [(ngModel)]="formData.email" placeholder="la.tua@email.com" required>
        </div>
      </div>
      <div class="form-group">
        <label for="oggetto">Oggetto</label>
        <input type="text" id="oggetto" name="oggetto" [(ngModel)]="formData.oggetto" placeholder="Oggetto del messaggio" required>
      </div>
      <div class="form-group">
        <label for="messaggio">Messaggio</label>
        <textarea id="messaggio" name="messaggio" [(ngModel)]="formData.messaggio" placeholder="Scrivi il tuo messaggio..." rows="5" required></textarea>
      </div>

      @if (errore) {
        <div class="form-message error">{{ errore }}</div>
      }
      @if (inviato) {
        <div class="form-message success">Messaggio inviato con successo! Ti risponderò al più presto.</div>
      }

      <button type="submit" class="submit-btn" [disabled]="caricamento">
        {{ caricamento ? 'Invio in corso...' : 'Invia messaggio' }}
      </button>
    </form>
  </div>
</section>
