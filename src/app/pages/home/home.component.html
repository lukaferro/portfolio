<section class="hero-section">
    <div class="hero-content">
        <div class="text-content">
            <h3 class="subtitle">{{ tr('home.subtitle') }}</h3>
            <h1 class="main-title">LUCA FERRO</h1>
            <h2 class="role-title"><span [innerHTML]="displayedHtml"></span><span class="blink">|</span></h2>
            <p class="description">{{ tr('home.description') }}</p>
        </div>
        <div class="image-content">
            <div class="image-glow"></div>
            <img src="me.png" alt="Luca Ferro" class="profile-image">
        </div>
    </div>
</section>
