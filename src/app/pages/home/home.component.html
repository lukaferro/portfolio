<section class="hero-section">
    <div class="hero-content">
        <div class="text-content">
            <h3 class="subtitle">{{ tr('home.subtitle') }}</h3>
            <h1 class="main-title">LUCA FERRO</h1>
            <h2 class="role-title"><span [innerHTML]="displayedHtml"></span><span class="blink">|</span></h2>
            <p class="description">{{ tr('home.description') }}</p>
        </div>
        <div class="image-content">
            <div class="image-glow"></div>
            <img src="me.png" alt="Luca Ferro" class="profile-image">
        </div>
    </div>
</section>

<section class="bio-section" appScrollFade>
    <p class="bio-text">{{ tr('home.bio') }}</p>
</section>

<section class="tech-section" appScrollFade>
    <h3 class="section-label">{{ tr('home.tech_stack') }}</h3>
    <div class="home-techs">
        @for (tech of techs; track tech) {
            <span class="home-tech-pill">{{ tech }}</span>
        }
    </div>
</section>

<div class="cta-section" appScrollFade>
    <a routerLink="/progetti" class="cta-btn">{{ tr('home.cta') }}</a>
</div>
